<h2><span class="q">Q1: 在直播或者拍短视频这一行，到底一个月能赚多少？主要看啥因素？</span></h2>
<div class="a">说白了就两件事：你肯不肯干，你能不能干多。你不想干，一个月一万块都难；你要是愿意多跑，一个月搞三万也正常。按场次算的，一场少说一千到两千五，但你也得扛得住累，早上四五点起来化妆，拍一下午，浑身散架。就这么简单，拍得越多，拿得越多。</div>
